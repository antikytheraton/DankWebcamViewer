# $schema: https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run plugin tests
        if: ${{ hashFiles('test.sh') != '' }}
        run: bash test.sh
